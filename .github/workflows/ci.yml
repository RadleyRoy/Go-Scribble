name: CI

# Runnable from the Actions tab (workflow_dispatch), and automatically on
# pushes and pull requests to main.
on:
  workflow_dispatch:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-test:
    name: Build, test and smoke-run
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Download dependencies
        run: go mod download

      - name: Build
        run: go build ./...

      - name: Vet
        run: go vet ./...

      - name: Test
        run: go test ./... -count=1

      - name: Smoke-run (server starts and serves)
        run: |
          go build -o scribble .
          ./scribble > server.log 2>&1 &
          SERVER_PID=$!

          # Wait until the server accepts connections (up to 30s).
          up=""
          for _ in $(seq 1 30); do
            if curl -fsS -o /dev/null http://localhost:8080/; then
              up=1
              break
            fi
            sleep 1
          done

          if [ -z "$up" ]; then
            echo "::error::server did not become ready"
            cat server.log
            kill "$SERVER_PID" 2>/dev/null || true
            exit 1
          fi

          echo "index.html served"

          # Verify the room API responds (its own command so a failure fails the step).
          curl -fsS -X POST http://localhost:8080/api/rooms -o room.json
          echo "created room: $(cat room.json)"

          kill "$SERVER_PID" 2>/dev/null || true
          echo "smoke run passed"
