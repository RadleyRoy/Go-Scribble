<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Doodle Royale | Fixed</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700&family=Rajdhani:wght@500;700&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="game-header">
        <div class="logo">DOODLE<span>ROYALE</span></div>
        <div class="word-slots">_ _ _ _ E</div>
        <div class="neon-text"><i class="fas fa-clock"></i> 01:14</div>
    </div>

    <div class="game-container">
        <div class="sidebar">
            <h3><i class="fas fa-users"></i> PLAYERS</h3>
            <div id="playerList">Guest</div>
        </div>

        <div class="canvas-area">
            <div class="canvas-wrapper">
                <canvas id="paintCanvas"></canvas>
            </div>
            <div class="toolbar">
                <button onclick="setTool('pencil')" id="pencilBtn" class="tool-btn active"><i
                        class="fas fa-pencil-alt"></i></button>
                <button onclick="setTool('eraser')" id="eraserBtn" class="tool-btn"><i
                        class="fas fa-eraser"></i></button>
                <input type="color" id="colorPicker" value="#39ff14" onchange="activeColor=this.value">
                <button onclick="clearCanvas()" class="tool-btn danger"><i class="fas fa-trash-can"></i></button>
            </div>
        </div>

        <div class="sidebar">
            <h3>CHAT</h3>
            <div id="chatBox" class="chat-messages" style="flex: 1; overflow-y: auto; background: #0d1117;"></div>

            <div class="chat-input-wrapper">
                <input type="text" id="chatInput" placeholder="Type here...">
                <button id="sendBtn">Send</button>
            </div>
        </div>
    </div>
    <script src="script.js" defer></script>
</body>

</html>
