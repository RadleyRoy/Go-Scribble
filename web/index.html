<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Doodle Royale | Fixed</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700&family=Rajdhani:wght@500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="game-header">
        <div class="logo">DOODLE<span>ROYALE</span></div>
        <div class="word-slots">_ _ _ _ E</div>
        <div class="neon-text"><i class="fas fa-clock"></i> 01:14</div>
    </div>

    <div class="game-container">
        <div class="sidebar">
            <h3><i class="fas fa-users"></i> PLAYERS</h3>
            <div id="playerList">Guest</div>
        </div>

        <div class="canvas-area">
            <div class="canvas-wrapper">
                <canvas id="paintCanvas"></canvas>
            </div>
            <div class="toolbar">
                <button onclick="setTool('pencil')" id="pencilBtn" class="tool-btn active"><i class="fas fa-pencil-alt"></i></button>
                <button onclick="setTool('eraser')" id="eraserBtn" class="tool-btn"><i class="fas fa-eraser"></i></button>
                <input type="color" id="colorPicker" value="#39ff14" onchange="activeColor=this.value">
                <button onclick="clearCanvas()" class="tool-btn danger"><i class="fas fa-trash-can"></i></button>
            </div>
        </div>

        <div class="sidebar">
            <h3><i class="fas fa-comments"></i> CHAT</h3>
            <div id="chatBox" class="chat-messages"></div>
            <div class="chat-input-wrapper">
                <input type="text" id="chatInput" placeholder="Guess...">
                <button id="sendBtn"><i class="fas fa-paper-plane"></i></button>
            </div>
        </div>
    </div>
    <script>
        window.addEventListener('load', () => {
    const canvas = document.getElementById('paintCanvas');
    if (!canvas) return; // Safety check
    
    const ctx = canvas.getContext('2d');
    const socket = new WebSocket(`ws://${window.location.host}/ws`);

    let painting = false;
    let lastPos = null;
    window.activeColor = '#39ff14'; // Set on window to be visible to picker
    let isEraser = false;

    function initCanvas() {
        const rect = canvas.parentNode.getBoundingClientRect();
        canvas.width = rect.width;
        canvas.height = rect.height;
        ctx.lineCap = 'round';
        ctx.lineJoin = 'round';
    }

    function getMousePos(e) {
        const rect = canvas.getBoundingClientRect();
        return { x: e.clientX - rect.left, y: e.clientY - rect.top };
    }

    // Drawing Logic
    canvas.onmousedown = (e) => { painting = true; lastPos = getMousePos(e); };
    window.onmouseup = () => { painting = false; lastPos = null; };
    canvas.onmousemove = (e) => {
        if (!painting) return;
        const pos = getMousePos(e);
        if (lastPos) {
            const color = isEraser ? '#000000' : window.activeColor;
            const size = isEraser ? 25 : 5;
            draw(lastPos.x, lastPos.y, pos.x, pos.y, color, size);
            if (socket.readyState === WebSocket.OPEN) {
                socket.send(JSON.stringify({ type: 'draw', x: pos.x, y: pos.y, prevX: lastPos.x, prevY: lastPos.y, color, size }));
            }
        }
        lastPos = pos;
    };

    function draw(x1, y1, x2, y2, color, size) {
        ctx.beginPath();
        ctx.strokeStyle = color;
        ctx.lineWidth = size;
        ctx.moveTo(x1, y1);
        ctx.lineTo(x2, y2);
        ctx.stroke();
    }

    socket.onmessage = (e) => {
        const msg = JSON.parse(e.data);
        if (msg.type === 'draw') draw(msg.prevX, msg.prevY, msg.x, msg.y, msg.color, msg.size);
        if (msg.type === 'clear') ctx.clearRect(0, 0, canvas.width, canvas.height);
    };

    // Attach functions to the WINDOW so HTML onclicks can find them
    window.setTool = (tool) => {
        isEraser = (tool === 'eraser');
        document.getElementById('pencilBtn').classList.toggle('active', !isEraser);
        document.getElementById('eraserBtn').classList.toggle('active', isEraser);
    };

    window.clearCanvas = () => {
        socket.send(JSON.stringify({type: 'clear'}));
        ctx.clearRect(0, 0, canvas.width, canvas.height);
    };

    window.addEventListener('resize', initCanvas);
    initCanvas();
});
    </script>
</body>
</html>
